# ==========================================
# CONFIGURAÇÕES DO SERVIDOR
# ==========================================
server.port=8080
spring.application.name=family-control-system

# ==========================================
# CONFIGURAÇÕES DO BANCO DE DADOS
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/family_control?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=family_user
spring.datasource.password=FamilyControl@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURAÇÕES DO JPA/HIBERNATE
# ==========================================
# create-drop: APAGA e recria tabelas ao iniciar (só em desenvolvimento!)
# update: atualiza tabelas sem apagar dados
# validate: só valida, não altera nada (produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# CONFIGURAÇÕES JWT
# ==========================================
# Segredo para assinar tokens (em produção variável de ambiente)
jwt.secret=MinhaChaveSecretaSuperSeguraParaFamilyControlSystem2024
jwt.expiracao=86400000

# ==========================================
# CONFIGURAÇÕES GERAIS
# ==========================================
spring.jackson.time-zone=America/Sao_Paulo